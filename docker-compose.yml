services:
  postgres:
    image: postgres:16
    container_name: microbiz-postgres
    environment:
      POSTGRES_USER: microbiz
      POSTGRES_PASSWORD: microbiz
      POSTGRES_DB: microbiz
    ports:
      - "5432:5432"
    volumes:
      - microbiz_pgdata:/var/lib/postgresql/data

volumes:
  microbiz_pgdata:
